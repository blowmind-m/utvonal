<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GPS: Hol vannak most éppen Balázsék?</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #0f1115; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        #dashboard {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 420px;
            background: rgba(18, 22, 28, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 24px;
            padding: 22px 22px 15px 22px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            z-index: 1000;
            box-sizing: border-box;
        }

        #speed-container {
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            margin-bottom: 12px;
            position: relative;
        }

        .speed-label { font-size: 0.75em; text-transform: uppercase; letter-spacing: 1.5px; color: #8a94a6; font-weight: 600; }
        #speed-value { font-size: 3.5em; font-weight: 900; color: #00e676; text-shadow: 0 0 20px rgba(0, 230, 118, 0.4); margin: 0; line-height: 1.1; }
        .speed-unit { font-size: 0.35em; color: #fff; font-weight: 400; margin-left: 2px; }

        .badges-wrapper { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        
        .badge {
            background: #ff9800; color: #000; padding: 4px 10px; border-radius: 12px;
            font-size: 0.75em; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;
        }
        .moving { background: #00e676 !important; color: #000 !important; }
        .waiting { background: #00b0ff !important; color: white !important; }
        .arrived { background: #ea4335 !important; color: white !important; }
        .country-badge { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-label { font-size: 0.7em; color: #8a94a6; text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }
        .stat-value { font-size: 0.95em; font-weight: 700; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .full-width { grid-column: span 2; }

        .progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00b0ff, #00e676); transition: width 0.4s ease; }

        /* Ticker - Hírsáv */
        #ticker-container {
            margin-top: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 6px 10px;
            font-size: 0.8em; color: #00e676; text-align: center; font-weight: 600; overflow: hidden; white-space: nowrap;
        }
        #ticker-text { transition: opacity 0.5s ease; }

        #sim-indicator {
            position: absolute; top: -15px; right: 20px; background: #e91e63; color: white; font-size: 0.7em; padding: 4px 10px; border-radius: 10px; font-weight: bold; letter-spacing: 1px; display: none; box-shadow: 0 5px 15px rgba(233, 30, 99, 0.5);
        }
        
        #loading-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%; background: #0f1115; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #00e676; transition: opacity 0.5s;
        }
        
        .gps-arrow {
            width: 40px; height: 40px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2L4 20L12 17L20 20L12 2Z" fill="%2300e676" stroke="%23ffffff" stroke-width="1.5"/></svg>');
            background-size: contain; background-repeat: no-repeat; background-position: center; transition: transform 0.1s linear;
        }
    </style>
</head>
<body>

    <div id="loading-overlay"><h2>GPS Útvonal tervezése...</h2><p>Műholdas kapcsolat folyamatban</p></div>
    <div id="map"></div>

    <div id="dashboard">
        <div id="sim-indicator">SZIMULÁCIÓ AKTÍV</div>
        
        <div id="speed-container">
            <div class="speed-label">Aktuális sebesség</div>
            <div id="speed-value">0<span class="speed-unit"> km/h</span></div>
            <div class="badges-wrapper">
                <div id="status-badge" class="badge">Tervezés...</div>
                <div id="country-badge" class="badge country-badge">🌍 Keresés...</div>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-box full-width">
                <div class="stat-label">Cél / Következő pont</div>
                <div class="stat-value" id="next-stop">Betöltés...</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Hátralévő / Megtett</div>
                <div class="stat-value"><span id="dist-remaining">-</span> / <span id="dist-covered" style="color:#aaa; font-size:0.8em;">-</span></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Magasságmérő ⛰️</div>
                <div class="stat-value" id="altitude-display">- m</div>
            </div>
            <div class="stat-box">
                <div class="stat-label" id="time-label">Aktuális Idő</div>
                <div class="stat-value" id="current-time-display">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Várható Érkezés</div>
                <div class="stat-value" id="eta-display">-</div>
            </div>
        </div>

        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <div id="ticker-container"><span id="ticker-text">Indulásra készen!</span></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const waypoints = [
            { name: "Szigethalom (Indulás)", lat: 47.3184296, lng: 19.0066748 },
            { name: "Letenye, MOL kút", lat: 46.4362118, lng: 16.7368428, isStop: true },
            { name: "Marché Tepanje", lat: 46.3484736, lng: 15.4864489, isStop: true },
            { name: "Marché Lom", lat: 45.8972487, lng: 14.2549978, isStop: true },
            { name: "Marina Julia (Cél)", lat: 45.7771682, lng: 13.527283, isStop: false }
        ];

        const map = L.map('map', { zoomControl: false }).setView([waypoints[0].lat, waypoints[0].lng], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        const carIcon = L.divIcon({ html: '<div id="gps-arrow-elem" class="gps-arrow"></div>', className: '', iconSize: [40, 40], iconAnchor: [20, 20] });
        const carMarker = L.marker([waypoints[0].lat, waypoints[0].lng], {icon: carIcon, zIndexOffset: 1000}).addTo(map);

        function getNextSunday730() {
            let now = new Date();
            let d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 7, 30, 0, 0);
            let daysUntilSunday = (7 - d.getDay()) % 7;
            if (daysUntilSunday === 0 && now.getTime() > d.getTime()) daysUntilSunday = 7;
            d.setDate(d.getDate() + daysUntilSunday);
            return d.getTime();
        }

        const SIMULATION_MODE = new URLSearchParams(window.location.search).has('sim');
        const SIM_SPEEDUP = 1500; 

        let actualStartTime = Date.now();
        let tripStartTime = getNextSunday730();
        
        if (SIMULATION_MODE) {
            tripStartTime = actualStartTime;
            document.getElementById('sim-indicator').style.display = 'block';
            document.getElementById('time-label').innerText = 'Szimulált Idő';
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getBearing(lat1, lng1, lat2, lng2) {
            let dLng = (lng2 - lng1) * Math.PI / 180;
            lat1 = lat1 * Math.PI / 180; lat2 = lat2 * Math.PI / 180;
            let y = Math.sin(dLng) * Math.cos(lat2);
            let x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        // Ticker logika
        const tickerMessages = [
            "🎵 Szól a Spotify: Nyári Slágerek 2024",
            "☕ Elfogyasztott kávék száma: 3",
            "🗣️ 'Mikor érünk már oda?' elhangzások: 12",
            "🔋 Balázs épp bont egy energiaitalt...",
            "📸 Traffipax veszély! (Reméljük nem villant)",
            "🍬 Gumicukor készlet kritikusan alacsony!"
        ];
        let tickerIndex = 0;
        setInterval(() => {
            let t = document.getElementById('ticker-text');
            t.style.opacity = 0;
            setTimeout(() => {
                t.innerText = tickerMessages[tickerIndex];
                t.style.opacity = 1;
                tickerIndex = (tickerIndex + 1) % tickerMessages.length;
            }, 500);
        }, SIMULATION_MODE ? 3000 : 8000); // Szimulációban gyorsabban vált

        const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${waypoints.map(w => w.lng + ',' + w.lat).join(';')}?overview=full&geometries=geojson`;

        let timeline = [];
        let finalEndTime = 0;
        let totalTripDistance = 0;

        fetch(osrmUrl).then(r => r.json()).then(data => {
            const coordinates = data.routes[0].geometry.coordinates;
            L.polyline(coordinates.map(c => [c[1], c[0]]), {color: '#00b0ff', weight: 6, opacity: 0.7}).addTo(map);
            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);
            
            let currentTime = tripStartTime;
            let stopsToMake = waypoints.filter(w => w.isStop).map(w => ({...w, done: false}));
            timeline.push({ time: currentTime, lat: coordinates[0][1], lng: coordinates[0][0], dist: 0, status: 'ÚTON', next: stopsToMake[0].name });

            for (let i = 0; i < coordinates.length - 1; i++) {
                let p1 = { lat: coordinates[i][1], lng: coordinates[i][0] };
                let p2 = { lat: coordinates[i+1][1], lng: coordinates[i+1][0] };
                let dist = calculateDistance(p1.lat, p1.lng, p2.lat, p2.lng);
                totalTripDistance += dist;
                currentTime += (dist / 105) * 60 * 60 * 1000;

                let currentNextStop = "Marina Julia (Cél)";
                for (let stop of stopsToMake) {
                    if (!stop.done) {
                        currentNextStop = stop.name;
                        if (calculateDistance(p2.lat, p2.lng, stop.lat, stop.lng) < 1.0) { 
                            stop.done = true;
                            timeline.push({ time: currentTime, lat: p2.lat, lng: p2.lng, dist: totalTripDistance, status: 'PIHENŐ (30p)', next: stop.name });
                            currentTime += 30 * 60 * 1000;
                            break;
                        }
                    }
                }
                timeline.push({ time: currentTime, lat: p2.lat, lng: p2.lng, dist: totalTripDistance, status: 'ÚTON', next: currentNextStop });
            }

            finalEndTime = currentTime;
            document.getElementById('eta-display').innerText = new Date(finalEndTime).toLocaleTimeString('hu-HU', {hour: '2-digit', minute:'2-digit'});
            requestAnimationFrame(updateLoop);
        });

        // Magasságmérő Profil
        function getAltitude(progress) {
            const profile = [ {p: 0.0, a: 110}, {p: 0.35, a: 155}, {p: 0.60, a: 320}, {p: 0.85, a: 540}, {p: 0.98, a: 20}, {p: 1.0, a: 2} ];
            for(let i=0; i<profile.length-1; i++) {
                if(progress >= profile[i].p && progress <= profile[i+1].p) {
                    let localP = (progress - profile[i].p) / (profile[i+1].p - profile[i].p);
                    return profile[i].a + (profile[i+1].a - profile[i].a) * localP;
                }
            } return 2;
        }

        // Ország Logika
        function getCountry(curDist, totalDist) {
            let distRemaining = totalDist - curDist;
            if (curDist < 240) return "🇭🇺 Magyarország";
            if (distRemaining > 25) return "🇸🇮 Szlovénia";
            return "🇮🇹 Olaszország";
        }

        let currentDisplayedSpeed = 0;
        let lastSpeedUpdate = 0;
        let lastBearing = 0;

        function updateLoop() {
            if (timeline.length === 0) return requestAnimationFrame(updateLoop);

            let now = Date.now();
            let simulatedNow = SIMULATION_MODE ? tripStartTime + ((now - actualStartTime) * SIM_SPEEDUP) : now;

            document.getElementById('current-time-display').innerText = new Date(simulatedNow).toLocaleTimeString('hu-HU', {hour: '2-digit', minute:'2-digit'});
            let badge = document.getElementById('status-badge');

            if (simulatedNow < tripStartTime) {
                document.getElementById('dist-remaining').innerText = Math.round(totalTripDistance) + " km";
                document.getElementById('next-stop').innerText = "Várakozás az indulásra";
                badge.className = 'badge waiting'; badge.innerText = 'INDULÁSRA VÁR';
                return requestAnimationFrame(updateLoop);
            }

            if (simulatedNow > finalEndTime) {
                let last = timeline[timeline.length-1];
                carMarker.setLatLng([last.lat, last.lng]);
                document.getElementById('speed-value').innerHTML = '0<span class="speed-unit"> km/h</span>';
                document.getElementById('dist-remaining').innerText = "0 km";
                document.getElementById('dist-covered').innerText = Math.round(totalTripDistance) + " km";
                document.getElementById('next-stop').innerText = "Célba értek!";
                document.getElementById('progress-bar').style.width = "100%";
                document.getElementById('altitude-display').innerText = "2 m";
                document.getElementById('country-badge').innerText = "🇮🇹 Olaszország";
                badge.className = 'badge arrived'; badge.innerText = 'MEGÉRKEZTEK!';
                map.setView([last.lat, last.lng], 15);
                return; 
            }

            for (let i = 0; i < timeline.length - 1; i++) {
                if (simulatedNow >= timeline[i].time && simulatedNow <= timeline[i+1].time) {
                    let p1 = timeline[i]; let p2 = timeline[i+1];
                    let progress = (simulatedNow - p1.time) / (p2.time - p1.time);

                    if (p1.status === 'PIHENŐ (30p)') {
                        carMarker.setLatLng([p1.lat, p1.lng]);
                        map.setView([p1.lat, p1.lng]); 
                        document.getElementById('speed-value').innerHTML = '0<span class="speed-unit"> km/h</span>';
                        document.getElementById('next-stop').innerText = p1.next;
                        badge.className = 'badge waiting'; badge.innerText = 'PIHENŐ (30p)';
                        
                        // Zajt adunk a magassághoz álló helyzetben is
                        let baseAlt = getAltitude(p1.dist / totalTripDistance);
                        document.getElementById('altitude-display').innerText = Math.round(baseAlt + (Math.random()*2 - 1)) + " m";
                        
                    } else {
                        let curLat = p1.lat + (p2.lat - p1.lat) * progress;
                        let curLng = p1.lng + (p2.lng - p1.lng) * progress;
                        let curDist = p1.dist + (p2.dist - p1.dist) * progress;
                        
                        carMarker.setLatLng([curLat, curLng]);
                        map.setView([curLat, curLng], 14, { animate: false }); 

                        if (curLat !== p1.lat || curLng !== p1.lng) {
                            let bearing = getBearing(p1.lat, p1.lng, p2.lat, p2.lng);
                            if (Math.abs(bearing - lastBearing) > 2) {
                                document.getElementById('gps-arrow-elem').style.transform = `rotate(${bearing}deg)`;
                                lastBearing = bearing;
                            }
                        }

                        document.getElementById('next-stop').innerText = p1.next;
                        badge.className = 'badge moving'; badge.innerText = 'ÚTON VANNAK';
                        document.getElementById('dist-covered').innerText = Math.round(curDist) + " km";
                        document.getElementById('dist-remaining').innerText = Math.round(totalTripDistance - curDist) + " km";
                        
                        let tripProgress = curDist / totalTripDistance;
                        document.getElementById('progress-bar').style.width = (tripProgress * 100) + "%";
                        
                        // Ország és Magasság frissítése
                        document.getElementById('country-badge').innerText = getCountry(curDist, totalTripDistance);
                        
                        let baseAlt = getAltitude(tripProgress);
                        let altNoise = Math.sin(now/500) * 3 + (Math.random()*2); // Enyhe ugrálás
                        document.getElementById('altitude-display').innerText = Math.round(baseAlt + altNoise) + " m";

                        if (now - lastSpeedUpdate > (SIMULATION_MODE ? 100 : 3000)) {
                            currentDisplayedSpeed = Math.round(105 * (0.95 + Math.random() * 0.1));
                            lastSpeedUpdate = now;
                        }
                        document.getElementById('speed-value').innerHTML = currentDisplayedSpeed + '<span class="speed-unit"> km/h</span>';
                    }
                    break;
                }
            }
            requestAnimationFrame(updateLoop);
        }
    </script>
</body>
</html>
